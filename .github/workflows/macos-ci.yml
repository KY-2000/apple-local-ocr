name: macOS CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcode-select -p
          xcrun --find swift
          swift --version

      - name: Build debug
        run: swift build -v

      - name: Run tests
        run: swift test -v

      - name: Build release
        run: swift build -c release
